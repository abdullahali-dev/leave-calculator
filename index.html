<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>حاسبة رصيد الإجازات</title>
</head>

<body data-bs-theme="dark">
    <div class="container mt-5" dir="rtl">
        <div class="d-flex justify-content-end mb-2">
            <button id="themeToggle" class="btn btn-outline-light btn-sm">دارك مود</button>
        </div>
        <ul class="nav nav-tabs pe-0 h5" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="leave-tab" data-bs-toggle="tab" data-bs-target="#leave"
                    type="button" role="tab" aria-controls="leave" aria-selected="true">حاسبة رصيد الإجازات</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#daysCount" type="button"
                    role="tab" aria-controls="profile" aria-selected="false">عدد الايام</button>
            </li>
        </ul>
        <div class="tab-content" id="myTabContent">
            <div class="tab-pane fade show active" id="leave" role="tabpanel">
                <div class="card">
                    <!-- <div class="card-header card-title h5">حاسبة رصيد الإجازات</div> -->
                    <div class="card-body form">
                        <div class="row justify-content-center">
                            <div class="col-12 form-group">
                                <label for="date">تاريخ التقاعد</label>
                                <input class="form-control" type="text" name="date" id="retirementDate"
                                    onchange="retirementDateChanged(this.value)">
                            </div>
                            <div class="col-12 form-group mt-2">
                                <label for="date">الرصيد السابق</label>
                                <input class="form-control" type="number" value="" id="oldRemaining">
                            </div>
                            <div class="col-12 mt-3 form-group">
                                <textarea
                                    placeholder="انسخ البيانات من شاشة النظام او من اكسل والصق هنا، لازم تكون 5 اعمدة الثالث تاريخ بداية الإجازه والخامس المدة"
                                    id="tblInput" class="form-control mb-3" rows="20"></textarea>
                            </div>
                            <div class="col-12 text-danger my-2" id="error"></div>
                            <div class="col-12">
                                <button class="btn btn-primary" onclick="calc()">احسب</button>
                            </div>
                            <div class="col-12 mt-3">
                                <table class="table table-responsive table-striped text-center">
                                    <thead>
                                        <tr>
                                            <th>التاريخ</th>
                                            <th>المدة</th>
                                            <th>الرصيد الحالي</th>
                                            <th>من الرصيد الحالي</th>
                                            <th>باقي الرصيد الحالي</th>
                                            <th>من الرصيد السابق</th>
                                            <th>باقي الرصيد السابق</th>
                                        </tr>
                                    </thead>
                                    <tbody id="resTblBody">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tab-pane fade" id="daysCount" role="tabpanel">
                <div class="card mt-3">
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-md-6">
                                <div class="card p-2">
                                    <div class="mb-2"><small>تاريخ البداية</small></div>
                                    <div class="row g-2 align-items-end">
                                        <div class="col-auto">
                                            <select id="hijriStartYear" class="form-select"></select>
                                        </div>
                                        <div class="col-auto">
                                            <select id="hijriStartMonth" class="form-select"></select>
                                        </div>
                                        <div class="col-auto">
                                            <select id="hijriStartDay" class="form-select"></select>
                                        </div>
                                        <div class="col-auto">
                                            <button id="hijriStartToday" class="btn btn-outline-secondary">اليوم</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card p-2">
                                    <div class="mb-2"><small>تاريخ النهاية</small></div>
                                    <div class="row g-2 align-items-end">
                                        <div class="col-auto">
                                            <select id="hijriEndYear" class="form-select"></select>
                                        </div>
                                        <div class="col-auto">
                                            <select id="hijriEndMonth" class="form-select"></select>
                                        </div>
                                        <div class="col-auto">
                                            <select id="hijriEndDay" class="form-select"></select>
                                        </div>
                                        <div class="col-auto">
                                            <button id="hijriEndToday" class="btn btn-outline-secondary">اليوم</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12 mt-3 d-flex gap-3 flex-wrap align-items-center">
                                <button id="countDaysBtn" class="btn btn-primary">احسب عدد الايام</button>

                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="includeStart" checked>
                                    <label class="form-check-label" for="includeStart">شامل تاريخ البداية</label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="includeEnd" checked>
                                    <label class="form-check-label" for="includeEnd">شامل تاريخ النهاية</label>
                                </div>

                                <div id="daysCountError" class="text-danger mt-2"></div>
                            </div>

                            <div class="col-12 mt-3">
                                <div id="daysCountSummary" class="fw-bold">—</div>
                            </div>

                            <div class="col-12 mt-2">
                                <table class="table table-striped table-sm text-center">
                                    <thead>
                                        <tr>
                                            <th>التاريخ</th>
                                            <th>من</th>
                                            <th>إلى</th>
                                            <th>أيام</th>
                                        </tr>
                                    </thead>
                                    <tbody id="daysCountTable"></tbody>
                                </table>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js" crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment-hijri@3.0.0/moment-hijri.min.js"></script>
    <script src="main.js" type="text/javascript"></script>
</body>

</html>
